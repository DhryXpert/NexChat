<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="NexChat — A premium AI chatbox powered by NVIDIA NIM. Chat with cutting-edge AI models in a sleek, fast interface."
    />
    <meta name="theme-color" content="#0a0a0f" />
    <title>NexChat — AI Chatbox</title>
    <link rel="icon" href="./assets/logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div id="app">
      <!-- ══════════════════════════════════════════
       SIDEBAR
  ══════════════════════════════════════════ -->
      <aside id="sidebar" role="navigation" aria-label="Chat history">
        <!-- Sidebar Header -->
        <div class="sidebar__header">
          <img
            src="./assets/logo.svg"
            alt="NexChat logo"
            class="sidebar__logo"
            width="36"
            height="36"
          />
          <span class="sidebar__brand">NexChat</span>
          <button
            class="sidebar__collapse-btn"
            id="sidebar-toggle"
            aria-label="Close sidebar"
            title="Toggle sidebar (Ctrl+B)"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="3" width="18" height="18" rx="2" />
              <path d="M9 3v18" />
            </svg>
          </button>
        </div>

        <!-- New Chat -->
        <button
          class="new-chat-btn"
          id="new-chat-btn"
          aria-label="New chat (Ctrl+N)"
          title="New chat (Ctrl+N)"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          New Chat
        </button>

        <!-- History Label -->
        <div class="sidebar__section-label">Recent</div>

        <!-- Chat List -->
        <div id="chat-list" role="list" aria-label="Conversation history"></div>

        <!-- Sidebar Footer -->
        <div class="sidebar__footer">
          <button id="settings-btn" aria-label="Open settings">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="3" />
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
              />
            </svg>
            Settings
          </button>
        </div>
      </aside>

      <!-- Mobile sidebar overlay -->
      <div id="sidebar-overlay" aria-hidden="true"></div>

      <!-- ══════════════════════════════════════════
       MAIN CONTENT
  ══════════════════════════════════════════ -->
      <main id="main" role="main">
        <!-- Chat Header -->
        <header id="chat-header">
          <!-- Mobile hamburger -->
          <button id="mobile-sidebar-btn" aria-label="Open sidebar">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          </button>

          <span id="chat-title">NexChat</span>

          <span class="model-badge" id="model-badge" title="Active model"
            >gemma-2-2b-it</span
          >
        </header>

        <!-- Message Feed -->
        <div
          id="chat-feed"
          role="log"
          aria-live="polite"
          aria-label="Chat messages"
        ></div>

        <!-- Input Bar -->
        <div id="input-area">
          <div class="input-wrapper">
            <textarea
              id="chat-input"
              placeholder="Message NexChat… (Enter to send, Shift+Enter for newline)"
              rows="1"
              aria-label="Chat input"
              autocomplete="off"
              spellcheck="true"
            ></textarea>
            <button
              id="send-btn"
              aria-label="Send message"
              title="Send (Enter)"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="22" y1="2" x2="11" y2="13" />
                <polygon points="22 2 15 22 11 13 2 9 22 2" />
              </svg>
            </button>
          </div>
          <p class="input-hint">AI can make mistakes. Verify important info.</p>
        </div>
      </main>
    </div>

    <!-- ══════════════════════════════════════════
     SETTINGS MODAL
══════════════════════════════════════════ -->
    <div
      id="settings-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
    >
      <div class="modal">
        <div class="modal__header">
          <h2 class="modal__title" id="modal-title">⚙ Settings</h2>
          <button
            class="modal__close"
            id="settings-close"
            aria-label="Close settings"
          >
            ✕
          </button>
        </div>

        <div class="modal__body">
          <!-- API Key -->
          <div class="field">
            <label class="field__label" for="settings-api-key"
              >NVIDIA API Key</label
            >
            <div class="field__input-wrap">
              <input
                type="password"
                id="settings-api-key"
                placeholder="nvapi-..."
                autocomplete="off"
                spellcheck="false"
              />
              <button
                class="field__eye-btn"
                id="toggle-api-key"
                aria-label="Show/hide API key"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
            <span class="field__sub"
              >Get your free key at
              <a
                href="https://build.nvidia.com"
                target="_blank"
                rel="noopener"
                style="color: var(--clr-accent-2)"
                >build.nvidia.com</a
              ></span
            >
          </div>

          <!-- Model Selection -->
          <div class="field">
            <label class="field__label" for="settings-model">Model</label>
            <select id="settings-model">
              <option value="google/gemma-2-2b-it" selected>
                Gemma 2 2B IT ⭐ (Active)
              </option>
              <option value="meta/llama-3.1-8b-instruct">
                Llama 3.1 8B Instruct (Recommended)
              </option>
              <option value="meta/llama-3.1-70b-instruct">
                Llama 3.1 70B Instruct (Most Powerful)
              </option>
              <option value="mistralai/mistral-7b-instruct-v0.3">
                Mistral 7B Instruct
              </option>
              <option value="google/gemma-7b">Gemma 7B (Basic)</option>
            </select>
          </div>

          <!-- Temperature -->
          <div class="field">
            <label class="field__label">Temperature</label>
            <div class="slider-row">
              <input
                type="range"
                id="settings-temperature"
                min="0"
                max="1"
                step="0.1"
                value="0.2"
              />
              <span class="slider-value" id="temperature-value">0.2</span>
            </div>
            <span class="field__sub"
              >Lower = more focused &amp; factual · Higher = more creative</span
            >
          </div>

          <!-- Top P -->
          <div class="field">
            <label class="field__label">Top P</label>
            <div class="slider-row">
              <input
                type="range"
                id="settings-topp"
                min="0.1"
                max="1"
                step="0.1"
                value="0.7"
              />
              <span class="slider-value" id="topp-value">0.7</span>
            </div>
          </div>

          <!-- Max Tokens -->
          <div class="field">
            <label class="field__label" for="settings-max-tokens"
              >Max Tokens</label
            >
            <select id="settings-max-tokens">
              <option value="512">512 — Short responses</option>
              <option value="1024" selected>1024 — Balanced</option>
              <option value="2048">2048 — Long responses</option>
              <option value="4096">4096 — Very long</option>
            </select>
          </div>

          <!-- System Prompt -->
          <div class="field">
            <label class="field__label" for="settings-system-prompt"
              >System Prompt</label
            >
            <textarea
              id="settings-system-prompt"
              placeholder="You are NexChat, a helpful AI assistant."
              rows="3"
            ></textarea>
          </div>

          <!-- Storage Info -->
          <p class="storage-info" id="storage-info">Loading storage info...</p>
        </div>

        <div class="modal__footer">
          <button class="btn btn--danger" id="clear-chats-btn">
            🗑 Clear All Chats
          </button>
          <div style="display: flex; gap: 10px">
            <button class="btn btn--ghost" id="settings-cancel">Cancel</button>
            <button class="btn btn--primary" id="settings-save">
              Save Settings
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast Container -->
    <div
      id="toast-container"
      aria-live="polite"
      aria-label="Notifications"
    ></div>

    <!-- App Entry Point (ES Module) -->
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
